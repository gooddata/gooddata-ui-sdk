version: "3.7"
services:
    isolated-tests:
        image: 020413372491.dkr.ecr.us-east-1.amazonaws.com/pullthrough/docker.io/library/node:24.18.0-bullseye
        entrypoint: ./scripts/isolated-test-record-entrypoint.sh
        volumes:
            - ../../../:/workspace:rw
        working_dir: /workspace/sdk/libs/sdk-backend-tiger
        user: "$USER_UID:$USER_GID"
        environment:
            - HOST=http://backend-mock:8080
            - GOODMOCK_HOST=backend-mock:8080
            - BACKEND_HOST=${BACKEND_HOST:-https://staging.dev-latest.stg11.panther.intgdc.com}
            - TIGER_API_TOKEN
            - GDC_UI
            - UPDATE_SNAPSHOTS
        depends_on:
            - backend-mock

    backend-mock:
        image: 020413372491.dkr.ecr.us-east-1.amazonaws.com/pullthrough/docker.io/gooddata/gooddata-goodmock:0.11.0
        command: record
        environment:
            - PROXY_HOST=${BACKEND_HOST:-https://staging.dev-latest.stg11.panther.intgdc.com}
