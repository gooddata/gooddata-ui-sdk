services:
    isolated-tests:
        image: 020413372491.dkr.ecr.us-east-1.amazonaws.com/pullthrough/docker.io/library/node:24.18.0-bullseye
        entrypoint: bash -c "./scripts/load-mappings.sh && npm run isolated-test-run"
        volumes:
            - ../../:/workspace:rw
        working_dir: /workspace/libs/sdk-backend-tiger
        user: "$USER_UID:$USER_GID"
        environment:
            - HOST=http://backend-mock:8080
            - GOODMOCK_HOST=backend-mock:8080
        depends_on:
            - backend-mock

    backend-mock:
        image: 020413372491.dkr.ecr.us-east-1.amazonaws.com/pullthrough/docker.io/gooddata/gooddata-goodmock:0.11.0
        command: replay
