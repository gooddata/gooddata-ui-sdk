services:
    backstop:
        image: ${NEOBACKSTOP_IMAGE:-neobackstop:local}
        build:
            context: ./neobackstop
            dockerfile: Dockerfile
        volumes:
            - ./neobackstop/output:/usr/neobackstop/output
        command: ${COMMAND_ARGS}
        depends_on:
            - ag-grid.com
        networks:
            - isolated

    ag-grid.com:
        image: ${NEOBACKSTOP_SERVE_IMAGE:-neobackstop-serve:local}
        build:
            context: ./neobackstop/serve
            dockerfile: Dockerfile
        networks:
            - isolated

# hide ag-grid watermark in tests by using isolated network and accessing storybook
# at http://ag-grid.com:8080 (see isDisplayWatermark() in ag-grid-enterprise.js)
networks:
    isolated:
        internal: true
