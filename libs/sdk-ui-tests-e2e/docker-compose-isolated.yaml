version: "3.7"
services:
    e2e-tests:
        image: ${E2E_IMAGE_URL}
        entrypoint: >
            bash -c "
              EXTRA_ARGS='';
              if [ \"$$PLAYWRIGHT_UPDATE_SNAPSHOTS\" = '1' ]; then EXTRA_ARGS='--update-snapshots'; fi;
              if [ -n \"$$FILTER\" ]; then
                npx playwright test --config ./playwright/playwright.config.mjs $$EXTRA_ARGS --grep \"$$PLAYWRIGHT_GREP\" $$(echo \"$$FILTER\" | tr ',' ' ');
              else
                SHARD_ARGS='';
                if [ -n \"$$SHARD_INDEX\" ] && [ -n \"$$SHARD_TOTAL\" ]; then SHARD_ARGS=\"--shard=$$SHARD_INDEX/$$SHARD_TOTAL\"; fi;
                npx playwright test --config ./playwright/playwright.config.mjs --grep \"$$PLAYWRIGHT_GREP\" $$EXTRA_ARGS $$SHARD_ARGS;
              fi
            "
        volumes:
            - ./recordings:/app/playwright/recordings:ro
            - ./test-results/:/app/test-results:rw
            - ./playwright/results:/app/playwright/results:rw
            - ./nginx:/app/nginx:ro
        user: "root"
        depends_on:
            - application
            - goodmock
        environment:
            - BASE_URL=http://application:9500
            - GOODMOCK_HOST=goodmock:8080
            - GOODMOCK_MODE
            - GDC_UI
            - HOST
            - NO_COLOR
            - TIGER_API_TOKEN
            - BACKEND_ENVIRONMENT
            - PLAYWRIGHT_UPDATE_SNAPSHOTS
            - PLAYWRIGHT_GREP
            - SHARD_INDEX
            - SHARD_TOTAL
            - FILTER

    application:
        image: ${IMAGE_URL}
        environment:
            - WORKSPACE_ID=${TEST_WORKSPACE_ID}
        volumes:
            - ./nginx/proxy-isolated-tests.conf:/etc/nginx/extra-conf.d/proxy-isolated-tests.conf
        depends_on:
            - goodmock

    goodmock:
        image: 020413372491.dkr.ecr.us-east-1.amazonaws.com/pullthrough/docker.io/gooddata/gooddata-goodmock:0.11.0
        command: ${GOODMOCK_MODE}
        environment:
            - REFERER_PATH=/dashboards/
            - PROXY_HOST=${HOST}
