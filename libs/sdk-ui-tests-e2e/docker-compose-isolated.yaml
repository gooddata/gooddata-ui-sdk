version: "3.7"
services:
    isolated-tests:
        image: 020413372491.dkr.ecr.us-east-1.amazonaws.com/pullthrough/mcr.microsoft.com/playwright:v1.59.1-noble
        entrypoint: >
            bash -c "
              EXTRA_ARGS='';
              if [ \"$$PLAYWRIGHT_UPDATE_SNAPSHOTS\" = '1' ]; then EXTRA_ARGS='--update-snapshots'; fi;
              if [ -n \"$$FILTER\" ]; then
                npx playwright test --config ./playwright/playwright.config.ts $$EXTRA_ARGS --grep '@pre-merge-isolated' $$(echo \"$$FILTER\" | tr ',' ' ');
              else
                SHARD_ARGS='';
                if [ -n \"$$SHARD_INDEX\" ] && [ -n \"$$SHARD_TOTAL\" ]; then SHARD_ARGS=\"--shard=$$SHARD_INDEX/$$SHARD_TOTAL\"; fi;
                npx playwright test --config ./playwright/playwright.config.ts --grep '@pre-merge-isolated' $$EXTRA_ARGS $$SHARD_ARGS;
              fi
            "
        volumes:
            - ../../:/gooddata-ui-sdk-e2e:rw
        working_dir: /gooddata-ui-sdk-e2e/libs/sdk-ui-tests-e2e
        user: "root"
        depends_on:
            - gooddata-ui-sdk-scenarios
            - backend-mock
        environment:
            - BASE_URL=http://gooddata-ui-sdk-scenarios:9500
            - GOODMOCK_HOST=backend-mock:8080
            - GOODMOCK_MODE=replay
            - HOST
            - NO_COLOR
            - TIGER_API_TOKEN
            - BACKEND_ENVIRONMENT
            - PLAYWRIGHT_UPDATE_SNAPSHOTS
            - SHARD_INDEX
            - SHARD_TOTAL
            - FILTER

    gooddata-ui-sdk-scenarios:
        image: $IMAGE_ID
        environment:
            - WORKSPACE_ID
        volumes:
            - ./nginx/proxy-isolated-tests.conf:/etc/nginx/extra-conf.d/proxy-isolated-tests.conf
        depends_on:
            - backend-mock

    backend-mock:
        image: 020413372491.dkr.ecr.us-east-1.amazonaws.com/pullthrough/docker.io/gooddata/gooddata-goodmock:0.10.0
        command: replay
        # Use environment variable "VERBOSE=true" for verbose logging
        environment:
            - REFERER_PATH=/dashboards/
            - PROXY_HOST=${HOST:-https://staging3.intgdc.com}
