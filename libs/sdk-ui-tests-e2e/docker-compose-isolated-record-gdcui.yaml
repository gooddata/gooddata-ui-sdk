version: "3.7"
services:
    isolated-tests:
        image: ${E2E_IMAGE_URL:-020413372491.dkr.ecr.us-east-1.amazonaws.com/pullthrough/mcr.microsoft.com/playwright:v1.58.2-noble}
        build: .
        entrypoint: >
            bash -c "
              if [ -n \"$$FILTER\" ]; then
                npx playwright test --config ./playwright/playwright.config.mjs --grep '@pre-merge-isolated' $$(echo \"$$FILTER\" | tr ',' ' ') --update-snapshots;
              else
                SHARD_ARGS='';
                if [ -n \"$$SHARD_INDEX\" ] && [ -n \"$$SHARD_TOTAL\" ]; then SHARD_ARGS=\"--shard=$$SHARD_INDEX/$$SHARD_TOTAL\"; fi;
                npx playwright test --config ./playwright/playwright.config.mjs --grep '@pre-merge-isolated' --update-snapshots $$SHARD_ARGS;
              fi
            "
        volumes:
            - ./recordings:/app/playwright/recordings:rw
            - ./test-results/:/app/test-results:rw
            - ./playwright/results:/app/playwright/results:rw
            - ./nginx:/app/nginx:ro
        user: "root"
        depends_on:
            - gooddata-ui-sdk-scenarios
            - backend-mock
        environment:
            - BASE_URL=http://gooddata-ui-sdk-scenarios:9500
            - GOODMOCK_HOST=backend-mock:8080
            - GOODMOCK_MODE=record
            - GDC_UI
            - HOST
            - NO_COLOR
            - TIGER_API_TOKEN
            - TEST_WORKSPACE_ID
            - SHARD_INDEX
            - SHARD_TOTAL
            - FILTER

    gooddata-ui-sdk-scenarios:
        image: ${IMAGE_URL}
        environment:
            - WORKSPACE_ID
        volumes:
            - ./nginx/proxy-isolated-tests.conf:/etc/nginx/extra-conf.d/proxy-isolated-tests.conf
        depends_on:
            - backend-mock

    backend-mock:
        image: 020413372491.dkr.ecr.us-east-1.amazonaws.com/pullthrough/docker.io/gooddata/gooddata-goodmock:0.10.0
        command: record
        # Use environment variable "VERBOSE=true" for verbose logging
        environment:
            - REFERER_PATH=/dashboards/
            - PROXY_HOST=${HOST}
