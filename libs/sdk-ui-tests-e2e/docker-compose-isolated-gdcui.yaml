version: "3.7"
services:
    isolated-tests:
        image: ${E2E_IMAGE_URL:-}
        build: .
        entrypoint: >
            bash -c "
              EXTRA_ARGS='';
              if [ \"$$PLAYWRIGHT_UPDATE_SNAPSHOTS\" = '1' ]; then EXTRA_ARGS='--update-snapshots'; fi;
              if [ -n \"$$FILTER\" ]; then
                npx playwright test --config ./playwright/playwright.config.mjs $$EXTRA_ARGS --grep '@pre-merge-isolated' $$(echo \"$$FILTER\" | tr ',' ' ');
              else
                SHARD_ARGS='';
                if [ -n \"$$SHARD_INDEX\" ] && [ -n \"$$SHARD_TOTAL\" ]; then SHARD_ARGS=\"--shard=$$SHARD_INDEX/$$SHARD_TOTAL\"; fi;
                npx playwright test --config ./playwright/playwright.config.mjs --grep '@pre-merge-isolated' $$EXTRA_ARGS $$SHARD_ARGS;
              fi
            "
        volumes:
            - ./recordings:/app/playwright/recordings:ro
            - ./results/:/app/playwright/results:rw
            - ./test-results/:/app/test-results:rw
            - ./nginx:/app/nginx:ro
        user: "root"
        depends_on:
            - gooddata-ui-sdk-scenarios
            - backend-mock
        environment:
            - BASE_URL=http://gooddata-ui-sdk-scenarios:9500
            - GOODMOCK_HOST=backend-mock:8080
            - GOODMOCK_MODE=${GOODMOCK_MODE:-replay}
            - GDC_UI
            - HOST
            - NO_COLOR
            - TIGER_API_TOKEN
            - BACKEND_ENVIRONMENT
            - PLAYWRIGHT_UPDATE_SNAPSHOTS
            - SHARD_INDEX
            - SHARD_TOTAL
            - FILTER

    gooddata-ui-sdk-scenarios:
        image: ${IMAGE_URL}
        environment:
            - WORKSPACE_ID
        volumes:
            - ./nginx/proxy-isolated-tests.conf:/etc/nginx/extra-conf.d/proxy-isolated-tests.conf
        depends_on:
            - backend-mock

    backend-mock:
        image: 020413372491.dkr.ecr.us-east-1.amazonaws.com/pullthrough/docker.io/gooddata/gooddata-goodmock:0.10.0
        command: ${GOODMOCK_MODE:-replay}
        environment:
            - REFERER_PATH=/dashboards/
            - PROXY_HOST=${HOST:-https://staging3.intgdc.com}
