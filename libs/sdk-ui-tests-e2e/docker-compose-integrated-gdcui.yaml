version: "3.7"
services:
    gooddata-ui-sdk-scenarios:
        image: ${IMAGE_URL}
        environment:
            - WORKSPACE_ID
            - TEST_BACKEND=${TEST_BACKEND:?Check README.md for more detail}
            - TEST_BACKEND_NO_PREFIX=${TEST_BACKEND_NO_PREFIX:?Check README.md for more detail}
        volumes:
            - ./nginx/templates:/etc/nginx/templates/

    integrated-tests:
        image: ${E2E_IMAGE_URL:-020413372491.dkr.ecr.us-east-1.amazonaws.com/pullthrough/mcr.microsoft.com/playwright:v1.58.2-noble}
        entrypoint: >
            bash -c "
              EXTRA_ARGS='';
              if [ \"$$PLAYWRIGHT_UPDATE_SNAPSHOTS\" = '1' ]; then EXTRA_ARGS='--update-snapshots'; fi;
              if [ -n \"$$FILTER\" ]; then
                npx playwright test --config ./playwright/playwright.config.mjs --grep \"$$PLAYWRIGHT_GREP\" $$EXTRA_ARGS $$(echo \"$$FILTER\" | tr ',' ' ');
              else
                SHARD_ARGS='';
                if [ -n \"$$SHARD_INDEX\" ] && [ -n \"$$SHARD_TOTAL\" ]; then SHARD_ARGS=\"--shard=$$SHARD_INDEX/$$SHARD_TOTAL\"; fi;
                npx playwright test --config ./playwright/playwright.config.mjs --grep \"$$PLAYWRIGHT_GREP\" $$EXTRA_ARGS $$SHARD_ARGS;
              fi
            "
        volumes:
            - ./test-results:/app/test-results:rw
            - ./playwright/results:/app/playwright/results:rw
        user: "root"
        depends_on:
            - gooddata-ui-sdk-scenarios
        environment:
            - BASE_URL=http://gooddata-ui-sdk-scenarios:9500
            - HOST=http://gooddata-ui-sdk-scenarios:9500
            - GDC_UI
            - NO_COLOR
            - TIGER_API_TOKEN
            - TIGER_DATASOURCES_NAME
            - TEST_WORKSPACE_ID
            - FIXTURE_TYPE
            - PLAYWRIGHT_GREP
            - PLAYWRIGHT_UPDATE_SNAPSHOTS
            - SHARD_INDEX
            - SHARD_TOTAL
            - FILTER
